name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build
        run: pyinstaller --onefile --windowed --name Zzz zzz.py

      - name: Rename artifact
        shell: cmd
        run: move dist\Zzz.exe Zzz-Setup.exe

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: Zzz-Setup.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build
        run: pyinstaller --windowed --name Zzz zzz.py

      - name: Zip app bundle
        run: cd dist && zip -r ../Zzz-mac.zip Zzz.app

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: Zzz-mac.zip
