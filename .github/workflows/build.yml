name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build
        run: pyinstaller --onefile --windowed --name Zzz zzz.py

      - name: Rename artifact
        shell: cmd
        run: move dist\Zzz.exe Zzz-Setup.exe

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: Zzz-Setup.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Swift app (universal)
        run: |
          cd mac
          swift build -c release --arch arm64
          swift build -c release --arch x86_64
          lipo -create -output Zzz \
            .build/arm64-apple-macosx/release/Zzz \
            .build/x86_64-apple-macosx/release/Zzz

      - name: Create .app bundle
        run: |
          mkdir -p Zzz.app/Contents/MacOS
          cp mac/Zzz Zzz.app/Contents/MacOS/Zzz
          cp mac/Info.plist Zzz.app/Contents/Info.plist
          chmod +x Zzz.app/Contents/MacOS/Zzz

      - name: Sign app (ad-hoc)
        run: codesign --force --deep --sign - Zzz.app

      - name: Zip app bundle
        run: zip -r Zzz-mac.zip Zzz.app

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: Zzz-mac.zip
